openapi: 3.1.0
info:
  title: Swoole Short URL Service API
  version: 1.2.0
  description: |
    Production-like short URL API specification with async visit log worker,
    idempotent create, and admin-protected management endpoints.
servers:
  - url: http://127.0.0.1:9501
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Service dependencies are ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Dependencies are not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
  /metrics:
    get:
      summary: Prometheus metrics endpoint
      responses:
        '200':
          description: Metrics in Prometheus text format
          content:
            text/plain:
              schema:
                type: string
  /api/v1/short-urls:
    post:
      summary: Create short URL
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                custom_code:
                  type: string
                expires_at:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateShortUrlResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /r/{code}:
    get:
      summary: Redirect to original URL
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirected
        '404':
          description: Not found
        '410':
          description: Inactive or expired
  /api/v1/admin/short-urls:
    get:
      summary: List short URLs
      security:
        - AdminApiKey: []
      responses:
        '200':
          description: Listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminShortUrlListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/admin/short-urls/bulk-disable:
    post:
      summary: Disable short URLs in bulk
      security:
        - AdminApiKey: []
      responses:
        '200':
          description: Bulk disabled result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDisableResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  securitySchemes:
    AdminApiKey:
      type: apiKey
      in: header
      name: X-Admin-Api-Key
  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, trace_id]
          properties:
            code:
              type: string
            message:
              type: string
            trace_id:
              type: string
            details:
              type: object
              additionalProperties: true
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
        service:
          type: string
        timestamp:
          type: string
          format: date-time
    ReadinessCheck:
      type: object
      required: [status, latency_ms]
      properties:
        status:
          type: string
          enum: [up, down, degraded]
        latency_ms:
          type: number
        details:
          type: object
          additionalProperties: true
        error:
          type: string
    ReadinessResponse:
      type: object
      required: [status, timestamp, checks]
      properties:
        status:
          type: string
          enum: [up, down, degraded]
        timestamp:
          type: string
          format: date-time
        checks:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ReadinessCheck'
    ShortUrlData:
      type: object
      required: [code, short_url, original_url, created_at, is_active]
      properties:
        code:
          type: string
        short_url:
          type: string
        original_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        expires_at:
          type: [string, 'null']
          format: date-time
        is_active:
          type: boolean
    CreateShortUrlResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ShortUrlData'
    AdminShortUrlListItem:
      type: object
      required:
        [code, short_url, original_url, is_active, total_visits, created_at]
      properties:
        code:
          type: string
        short_url:
          type: string
        original_url:
          type: string
          format: uri
        is_active:
          type: boolean
        total_visits:
          type: integer
        created_at:
          type: string
          format: date-time
        expires_at:
          type: [string, 'null']
          format: date-time
        last_visited_at:
          type: [string, 'null']
          format: date-time
    AdminShortUrlListData:
      type: object
      required: [items, page, per_page, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminShortUrlListItem'
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
    AdminShortUrlListResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/AdminShortUrlListData'
    BulkDisableData:
      type: object
      required: [requested, disabled, missing]
      properties:
        requested:
          type: integer
        disabled:
          type: integer
        missing:
          type: array
          items:
            type: string
    BulkDisableResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/BulkDisableData'
